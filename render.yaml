services:
  - type: web
    name: monitor-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: monitor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: monitor-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DB_POOL_SIZE
        value: 10
      - key: LOG_LEVEL
        value: info

  # ⚠️ BUG ORIGINAL: había dos bloques "services:" separados.
  # En YAML las claves duplicadas se sobreescriben — el servicio web
  # desaparecía y solo quedaba Redis. Ahora todo está en un solo bloque.
  - type: redis
    name: monitor-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: monitor-db
    databaseName: monitor
    user: monitor_prod
    plan: free
